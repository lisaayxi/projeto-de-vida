<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Meus objetivos pessoais para este ano">
  <title>Meus Objetivos do Ano</title>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0e0e0e;
      --bg2:       #161616;
      --verde:     #6FFF57;
      --verde-dim: rgba(111,255,87,0.15);
      --verde-glow:rgba(111,255,87,0.35);
      --roxo:      #3A375E;
      --roxo-dim:  rgba(58,55,94,0.4);
      --branco:    #FFFFFF;
      --cinza:     #888;
      --trans:     all 0.3s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--branco);
      font-family: 'Chakra Petch', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* ── GRID BACKGROUND ─────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(111,255,87,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(111,255,87,.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── SCANLINES ───────────────────────────── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.07) 2px,
        rgba(0,0,0,.07) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── AMBIENT GLOW ────────────────────────── */
    .glow-orb {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(111,255,87,.07) 0%, transparent 65%);
      top: -200px; left: -200px;
      pointer-events: none;
      z-index: 0;
      animation: drift 8s ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translate(0,0); }
      to   { transform: translate(80px, 60px); }
    }

    /* ── MAIN CARD ───────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      background: var(--bg2);
      border: 1px solid rgba(111,255,87,.12);
      border-radius: 12px;
      padding: 2.5rem 2.5rem 2rem;
      box-shadow:
        0 0 0 1px rgba(111,255,87,.05),
        0 20px 60px rgba(0,0,0,.6),
        0 0 80px rgba(111,255,87,.04) inset;
      animation: cardIn .7s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(30px) scale(.97); }
      to   { opacity:1; transform: translateY(0)    scale(1);   }
    }

    /* corner decorations */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--verde);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 12px 0 0 0; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 12px 0; }

    /* ── HEADER ──────────────────────────────── */
    .header {
      margin-bottom: 2.2rem;
      animation: fadeUp .6s .1s both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: translateY(0);    }
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--verde);
      margin-bottom: .9rem;
    }
    .tag::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--verde);
      box-shadow: 0 0 8px var(--verde);
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; box-shadow: 0 0 6px var(--verde); }
      50%     { opacity:.5; box-shadow: 0 0 14px var(--verde); }
    }

    .titulo {
      font-size: clamp(1.6rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: 1px;
      line-height: 1.2;
      color: var(--branco);
    }
    .titulo .cursor {
      color: var(--verde);
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink {
      0%,100% { opacity:1; }
      50%     { opacity:0; }
    }

    .subtitulo {
      margin-top: .5rem;
      font-size: .8rem;
      font-weight: 300;
      font-style: italic;
      color: var(--cinza);
      letter-spacing: .05em;
    }

    /* ── PROGRESS BAR ────────────────────────── */
    .progress-wrap {
      margin-bottom: 2rem;
      animation: fadeUp .6s .2s both;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: .7rem;
      color: var(--cinza);
      letter-spacing: .1em;
      margin-bottom: .5rem;
    }
    .progress-label span:last-child { color: var(--verde); }
    .progress-track {
      height: 3px;
      background: rgba(255,255,255,.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--roxo), var(--verde));
      border-radius: 2px;
      transition: width 1.2s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 8px var(--verde-glow);
    }

    /* ── GOALS LIST ──────────────────────────── */
    .goals {
      display: flex;
      flex-direction: column;
      gap: .4rem;
      animation: fadeUp .6s .3s both;
    }

    .goal {
      position: relative;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--roxo-dim);
      border: 1px solid rgba(58,55,94,.7);
      border-left: 3px solid var(--roxo);
      padding: 1.1rem 1.3rem;
      font-family: 'Chakra Petch', sans-serif;
      font-size: .95rem;
      font-weight: 500;
      color: var(--branco);
      cursor: pointer;
      text-align: left;
      transition: var(--trans);
      overflow: hidden;
      border-radius: 0;
    }
    .goal:first-child { border-radius: 8px 8px 0 0; }
    .goal:last-child  { border-radius: 0 0 8px 8px; }
    .goal:only-child  { border-radius: 8px; }

    /* shimmer on hover */
    .goal::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(111,255,87,.06) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform .5s ease;
    }
    .goal:hover::after { transform: translateX(100%); }

    .goal:hover {
      background: rgba(58,55,94,.75);
      border-left-color: var(--verde);
      box-shadow:
        0 0 20px rgba(111,255,87,.15),
        inset 0 0 20px rgba(111,255,87,.04);
      transform: translateX(4px);
      color: var(--verde);
    }
    .goal:focus-visible {
      outline: 2px solid var(--verde);
      outline-offset: -2px;
    }
    .goal:active { transform: translateX(2px); }

    /* checkbox */
    .check {
      flex-shrink: 0;
      width: 18px; height: 18px;
      border: 1.5px solid var(--roxo);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--trans);
      font-size: 10px;
    }
    .goal:hover .check,
    .goal.done  .check {
      border-color: var(--verde);
      background: var(--verde-dim);
      color: var(--verde);
    }
    .goal.done {
      opacity: .55;
      border-left-color: var(--verde);
    }
    .goal.done .label { text-decoration: line-through; text-decoration-color: var(--verde); }

    /* index tag */
    .idx {
      margin-left: auto;
      font-size: .65rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,.2);
      letter-spacing: .05em;
      flex-shrink: 0;
    }

    /* ── FOOTER ──────────────────────────────── */
    .footer {
      margin-top: 1.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(255,255,255,.06);
      animation: fadeUp .6s .45s both;
    }
    .footer-text {
      font-size: .7rem;
      font-weight: 300;
      color: rgba(255,255,255,.25);
      letter-spacing: .08em;
    }
    .footer-count {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .1em;
      color: var(--verde);
    }
    .footer-count span { color: rgba(255,255,255,.3); font-weight: 300; }
  </style>
</head>
<body>

<div class="glow-orb"></div>

<div class="card">

  <div class="header">
    <div class="tag">meta pessoal &bull; 2025</div>
    <h1 class="titulo">Meus Objetivos do Ano<span class="cursor">_</span></h1>
    <p class="subtitulo">// clique para marcar como concluído</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>PROGRESSO</span>
      <span id="pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="bar"></div>
    </div>
  </div>

  <div class="goals" role="list" id="goals">
    <button class="goal" role="listitem">
      <span class="check"></span>
      <span class="label">Cursos na Alura</span>
      <span class="idx">01</span>
    </button>
    <button class="goal" role="listitem">
      <span class="check"></span>
      <span class="label">Criar projetos em Javascript</span>
      <span class="idx">02</span>
    </button>
    <button class="goal" role="listitem">
      <span class="check"></span>
      <span class="label">Criar um portfolio</span>
      <span class="idx">03</span>
    </button>
    <button class="goal" role="listitem">
      <span class="check"></span>
      <span class="label">Atualizar meu currículo</span>
      <span class="idx">04</span>
    </button>
  </div>

  <div class="footer">
    <span class="footer-text">// projetodevida.app</span>
    <span class="footer-count" id="count">0 <span>/ 4 concluídos</span></span>
  </div>

</div>

<script>
  const goals = document.querySelectorAll('.goal');
  const bar   = document.getElementById('bar');
  const pct   = document.getElementById('pct');
  const count = document.getElementById('count');

  function update() {
    const done  = document.querySelectorAll('.goal.done').length;
    const total = goals.length;
    const p     = Math.round((done / total) * 100);
    bar.style.width = p + '%';
    pct.textContent = p + '%';
    count.innerHTML = `${done} <span>/ ${total} concluídos</span>`;
  }

  goals.forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('done');
      const check = btn.querySelector('.check');
      check.textContent = btn.classList.contains('done') ? '✓' : '';
      update();
    });
  });

  // animate progress bar on load
  setTimeout(update, 600);
</script>

</body>
</html>
